events {}

http {
    resolver 127.0.0.11 ipv6=off;

    server {
        listen 80;
        server_name bot.progress-institute.tech;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name bot.progress-institute.tech;

        ssl_certificate /etc/letsencrypt/live/bot.progress-institute.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bot.progress-institute.tech/privkey.pem;

        location / {
            set $app_upstream http://app:8080;
            proxy_pass $app_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
